base_config: ../default.yaml
description: 'Stage 3 ablation study: full adaptive fusion and variants removing one representation branch.'
datasets:
- Coffee
- ECG200
- GunPoint
- FordA
- Wafer
- ItalyPowerDemand
- Trace
- TwoLeadECG
- CBF
- Beef
- Meat
- OliveOil
- Lightning2
- Lightning7
- MoteStrain
- SonyAIBORobotSurface1
- SonyAIBORobotSurface2
- Plane
- FaceFour
- Ham
seeds:
- 42
- 43
- 44
methods:
- name: adaptive_fusion_full
  override:
    experiment:
      name: adaptive_fusion_full
      representations:
      - GAF
      - MTF
      - RP
      - STFT
    model:
      name: AdaptiveFusionCNN
      fusion: adaptive_gating
- name: ablation_without_gaf
  override:
    experiment:
      name: ablation_without_gaf
      representations:
      - MTF
      - RP
      - STFT
    model:
      name: AdaptiveFusionCNN
      fusion: adaptive_gating
- name: ablation_without_mtf
  override:
    experiment:
      name: ablation_without_mtf
      representations:
      - GAF
      - RP
      - STFT
    model:
      name: AdaptiveFusionCNN
      fusion: adaptive_gating
- name: ablation_without_rp
  override:
    experiment:
      name: ablation_without_rp
      representations:
      - GAF
      - MTF
      - STFT
    model:
      name: AdaptiveFusionCNN
      fusion: adaptive_gating
- name: ablation_without_stft
  override:
    experiment:
      name: ablation_without_stft
      representations:
      - GAF
      - MTF
      - RP
    model:
      name: AdaptiveFusionCNN
      fusion: adaptive_gating
