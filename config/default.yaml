# Default configuration for paper-grade experiments.
# Do not edit this file for one-off runs. Create an experiment file under
# config/experiments/ or config/ablations/ and inherit from this file.
project:
  name: adaptive-fusion-ts2img
  seed: 42
  description: Adaptive fusion of 2D time-series representations using a lightweight CNN.

paths:
  # UCR layout: data/UCR/Coffee/Coffee_TRAIN.tsv and Coffee_TEST.tsv
  data_root: data/UCR
  output_root: outputs
  cache_root: cache

experiment:
  name: adaptive_fusion_full
  dataset: Coffee
  image_size: 64
  representations: [GAF, MTF, RP, STFT]
  validation_ratio: 0.2
  run_name_template: "{dataset}_{experiment}_img{image_size}_seed{seed}"

data:
  input_mode: 2d_representations
  normalize: zscore_per_sample
  keep_ucr_split: true

training:
  epochs: 100
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001
  patience: 20
  num_workers: 2
  device: auto
  scheduler: reduce_on_plateau
  scheduler_factor: 0.5
  scheduler_patience: 5

checkpoint:
  resume: true
  last_name: last_checkpoint.pt
  best_name: best_model.pt

model:
  name: AdaptiveFusionCNN
  feature_dim: 128
  gate_hidden: 128
  dropout: 0.3
  fusion: adaptive_gating

transform:
  gaf:
    method: summation
    sample_range: [-1, 1]
  mtf:
    n_bins: 8
    strategy: quantile
  rp:
    threshold: null
    percentage: 10.0
  stft:
    nperseg_max: 32
    noverlap_ratio: 0.5
    log_scale: true

evaluation:
  metrics: [accuracy, macro_f1, precision, recall]
  save_alpha: true
  save_confusion_matrix: true
  save_learning_curve: true
  benchmark_inference: true
  benchmark_repeats: 3
  benchmark_warmup_batches: 2

reporting:
  save_config_used: true
  save_environment: true
  collect_git_info: true
